<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Grid lines (light for dark bg) -->
  <!-- Horizontal grid lines -->
  <line x1="60" y1="240" x2="360" y2="240" stroke="#444" stroke-width="2" />
  <line x1="60" y1="190" x2="360" y2="190" stroke="#444" stroke-width="2" />
  <line x1="60" y1="140" x2="360" y2="140" stroke="#444" stroke-width="2" />
  <line x1="60" y1="90" x2="360" y2="90" stroke="#444" stroke-width="2" />
  <line x1="60" y1="40" x2="360" y2="40" stroke="#444" stroke-width="2" />

  <!-- Y-axis -->
  <line x1="60" y1="40" x2="60" y2="250" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- X-axis -->
  <line x1="60" y1="250" x2="370" y2="250" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- Bars - white with slight gradient effect -->
  <!-- Bar 1 -->
  <rect x="80" y="180" width="45" height="70" rx="4" fill="#ffffff" />
  <!-- Bar 2 (taller) -->
  <rect x="140" y="120" width="45" height="130" rx="4" fill="#ffffff" />
  <!-- Bar 3 -->
  <rect x="200" y="200" width="45" height="50" rx="4" fill="#ffffff" />
  <!-- Bar 4 (tallest) -->
  <rect x="260" y="80" width="45" height="170" rx="4" fill="#ffffff" />
  <!-- Bar 5 -->
  <rect x="320" y="150" width="45" height="100" rx="4" fill="#ffffff" />

  <!-- Optional subtle bar highlights for depth -->
  <rect x="83" y="182" width="8" height="66" rx="2" fill="#e5e5e5" opacity="0.6" />

</svg>